                <div key={issue.id} style={{...S.card,border:issue.votes>=30?"2px solid #2563eb":"1px solid #e2e8f0"}}>
                  <div style={{display:"flex",gap:8,marginBottom:8}}>
                    <span style={{background:issue.status==="진행중"?"#fef3c7":"#e0e7ff",color:issue.status==="진행중"?"#d97706":"#4f46e5",padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:700}}>{issue.status}</span>
                    <span style={{background:"#f1f5f9",color:"#475569",padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:600}}>{issue.tag}</span>
                  </div>
                  <h3 style={{fontSize:15,fontWeight:700,color:"#0f172a",marginBottom:10}}>{issue.title}</h3>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>동의율 {Math.round(issue.votes/p.members*100)}% ({issue.votes}/{p.members}명)</div>
                      <div style={{background:"#e2e8f0",borderRadius:6,height:8,overflow:"hidden"}}>
                        <div className="prog-bar" style={{height:"100%",width:`${issue.votes/p.members*100}%`,background:issue.votes/p.members>=.3?"#2563eb":"#94a3b8",borderRadius:6}}/>
                      </div>
                    </div>
                    <button style={{marginLeft:16,...(issue.votes/p.members>=.3?S.primBtn:{...S.secBtnSm,color:"#94a3b8",cursor:"not-allowed"}),fontSize:12,padding:"8px 14px"}}>
                      {issue.votes/p.members>=.3?"법률검토 요청":"30% 미달"}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* Laws */}
        <SectionHead tag="관련 법령" title="알아두면 힘이 되는 법률" />
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {LAWS.map((law,i)=>(
            <div key={i} style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <span style={{background:"#eff6ff",color:"#2563eb",padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:700}}>{law.short}</span>
                <span style={{fontSize:11,color:"#94a3b8"}}>{law.relevant}</span>
              </div>
              <h3 style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:6,lineHeight:1.4}}>{law.title}</h3>
              <p style={{fontSize:13,color:"#64748b",lineHeight:1.6}}>{law.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── SHARED COMPONENTS ───
function SectionHead({ tag, title, desc }) {
  return (
    <div style={{textAlign:"center",marginBottom:36}}>
      <span style={{display:"inline-block",background:"#eff6ff",color:"#2563eb",padding:"4px 14px",borderRadius:14,fontSize:13,fontWeight:700,marginBottom:10}}>{tag}</span>

      {desc&&<p style={{fontSize:15,color:"#64748b",marginTop:6}}>{desc}</p>}
    </div>
  );
}
